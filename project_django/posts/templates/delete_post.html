{% extends "layout.html" %}

{% block title %}
    Posts Index
{% endblock %}

{% block content %}
    <h1 class="text-center mt-4">Are you sure you want to Delete Post</h1>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
