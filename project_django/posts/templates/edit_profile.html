{% extends "layout.html" %}

{% block title %}
    Edit Profile
{% endblock %}

{% block content %}
<style>
  .auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
}

/* Card */
.auth-card {
    width: 400px;
    padding: 30px;
    border-radius: 14px;
    background: #1e1e1e;
    box-shadow: 0 6px 25px rgba(0,0,0,0.3);
}

/* Title */
.title {
    text-align: center;
    margin-bottom: 20px;
}

/* Profile image */
.profile-section {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
}

.profile-preview {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #949f94;
}

/* Form spacing */
.form-group {
    margin-bottom: 15px;
}

/* Inputs */
.form-group input,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #555;
    background: #2b2b2b;
    color: white;
}

/* Button */
.save-btn-primary {
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

.save-btn-primary:hover {
    background: #3ea743;
}

</style>
<div class="auth-container">
    <div class="auth-card">
      <h2 class="title">Edit Profile</h2>
       <div class="profile-section">
      {% if user.profile_picture %}
        <img src="{{ user.profile_picture.url }}" class="profile-preview" alt="Profile Picture">
      {% else %}
        <img src="/static/default.png" class="profile-preview" alt="Default Profile Picture">
      {% endif %}

       </div>
       
        <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">
          {{ form.username }}
        </div>
        <div class="form-group">
          {{ form.email }}
        </div>
        <div class="form-group">
          {{ form.bio }}
        </div>
        <div class="form-group">
          {{ form.profile_picture }}
        </div>
        <button type="submit" class="save-btn-primary">Save Changes</button>
        </form>
       
    </div>
</div>
{% endblock %}
