{%extends "layout.html"%}
{%block title%}
    Login
{% endblock %}

{%block content %}
<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.auth-card {
    width: 350px;
    padding: 30px;
    border-radius: 12px;
    background: #1e1e1e;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.auth-card h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
}

.form-group input {
    padding: 10px;
    border: 1px solid #555;
    border-radius: 6px;
    margin-top: 5px;
    background: #2b2b2b;
    color: white;
}

.login_btn {
    width: 100%;
    padding: 10px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

.login_btn:hover {
    background: #45a049;
}

.error {
    color: red;
    font-size: 12px;
}

.auth-footer {
    text-align: center;
    margin-top: 15px;
}
</style>

<div class="auth-container">
  <div class="auth-card">
    <h2>Login</h2>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="identifier" placeholder="Enter username" required>
      </div>
      <div class="form-group">
         <label for="email">Email*:</label>
        <input type="email" class="identifier" id="email" name="email" placeholder="Enter email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>

      {% if error %}
        <small class="error">{{ error }}</small>
      {% endif %}

      <button type="submit" class="login_btn">Login</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Register here</a>
    </p>
  </div>
</div>

{%endblock%}
